apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-immutable-restorepoint-deletion
  annotations:
    policies.kyverno.io/title: Deny Deletion of Immutable Restore Points
    policies.kyverno.io/category: Veeam Kasten
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: RestorePoint, RestorePointContent
    kyverno.io/kyverno-version: 1.12.1
    policies.kyverno.io/minversion: 1.12.0
    kyverno.io/kubernetes-version: "1.24-1.30"
    # SCOPE B: requires Kasten v9.0 admission control on RestorePoints (Preview).
    veeamkasten.dev/scope: "B"
    veeamkasten.dev/availability: preview-v9
    veeamkasten.dev/status: partially-verified
    policies.kyverno.io/description: >-
      Deny deletion of a policy-managed Veeam Kasten RestorePoint or
      RestorePointContent whose data was exported to an immutable location
      profile, so retention/immutability guarantees cannot be circumvented by
      deleting the Kubernetes object.
      Immutability is NOT a field on the RestorePoint; it is a property of the
      originating Location Profile
      (spec.export.location.objectStore.protectionPeriod). This policy resolves
      it with a Kyverno context apiCall to that Profile.
      VERIFIED (cluster CRDs 2025-12): RestorePointContent has NO spec (status
      only); the originating policy is recorded under
      status.*.originatingPolicies[]; the Profile immutability field is
      spec.export.location.objectStore.protectionPeriod.
      STILL UNVERIFIED: the exact per-artifact path to the originating Profile
      ref (status.*.artifacts[].meta.{kanister,dataservice}.profileRef) needs a
      real RestorePointContent to confirm; and whether DELETE admission actually
      fires for these objects depends on Kasten v9.0 admission (Preview) - this
      cluster has no Kasten admission webhook, so enforcement here relies on
      Kyverno's own webhook.
      LIMITATION: if the Profile cannot be resolved at admission time, the
      immutability signal is unavailable and the policy will NOT deny.
spec:
  validationFailureAction: Audit
  background: false
  rules:
    - name: deny-immutable-delete
      match:
        any:
          - resources:
              kinds:
                - apps.kio.kasten.io/v1alpha1/RestorePoint
                - apps.kio.kasten.io/v1alpha1/RestorePointContent
              operations:
                - DELETE
      context:
        # Policy-managed marker = originating policies recorded in status. On
        # DELETE the object is in oldObject; fall back to object for testing.
        # RestorePoint and RestorePointContent use different status sub-paths.
        - name: originatingPolicies
          variable:
            jmesPath: >-
              (request.oldObject.status.restorePointContentDetails.originatingPolicies ||
               request.object.status.restorePointContentDetails.originatingPolicies ||
               request.oldObject.status.restorePointDetails.originatingPolicies ||
               request.object.status.restorePointDetails.originatingPolicies)
            default: []
        # [unverified] originating Profile ref, taken from the first artifact
        # that carries one. Confirm the exact meta sub-key (kanister vs
        # dataservice) against a real RestorePointContent.
        - name: profileName
          variable:
            jmesPath: >-
              (request.oldObject.status.restorePointContentDetails.artifacts[].meta.*.profileRef.name | [0]) ||
              (request.object.status.restorePointContentDetails.artifacts[].meta.*.profileRef.name | [0]) ||
              (request.oldObject.status.restorePointDetails.artifacts[].meta.*.profileRef.name | [0]) ||
              (request.object.status.restorePointDetails.artifacts[].meta.*.profileRef.name | [0])
            default: ""
        - name: profileNamespace
          variable:
            jmesPath: >-
              (request.oldObject.status.restorePointContentDetails.artifacts[].meta.*.profileRef.namespace | [0]) ||
              (request.object.status.restorePointContentDetails.artifacts[].meta.*.profileRef.namespace | [0]) ||
              (request.oldObject.status.restorePointDetails.artifacts[].meta.*.profileRef.namespace | [0]) ||
              (request.object.status.restorePointDetails.artifacts[].meta.*.profileRef.namespace | [0])
            default: "kasten-io"
        # Resolve immutability from the originating Location Profile. In offline
        # CLI tests this value is injected via the variables file, which
        # overrides the apiCall (no live cluster needed).
        - name: protectionPeriod
          apiCall:
            urlPath: "/apis/config.kio.kasten.io/v1alpha1/namespaces/{{ profileNamespace }}/profiles/{{ profileName }}"
            jmesPath: "spec.export.location.objectStore.protectionPeriod || ''"
            default: ""
      # Only policy-managed restore points are in scope.
      preconditions:
        all:
          - key: "{{ length(originatingPolicies) }}"
            operator: GreaterThan
            value: 0
      validate:
        message: >-
          Deletion denied: this RestorePoint/RestorePointContent is policy-managed
          and was exported to an immutable location profile (protectionPeriod is
          set). Immutable restore points must expire naturally and cannot be
          deleted manually.
        deny:
          conditions:
            all:
              - key: "{{ protectionPeriod }}"
                operator: NotEquals
                value: ""
