apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-immutable-restorepoint-deletion
  annotations:
    policies.kyverno.io/title: Deny Deletion of Immutable Restore Points
    policies.kyverno.io/category: Veeam Kasten
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: RestorePoint, RestorePointContent
    kyverno.io/kyverno-version: 1.12.1
    policies.kyverno.io/minversion: 1.12.0
    kyverno.io/kubernetes-version: "1.24-1.30"
    # SCOPE B: requires Kasten v9.0 admission control on RestorePoints (Preview).
    veeamkasten.dev/scope: "B"
    veeamkasten.dev/availability: preview-v9
    veeamkasten.dev/status: partially-verified
    policies.kyverno.io/description: >-
      Deny deletion of a policy-managed Veeam Kasten RestorePoint or
      RestorePointContent whose data was exported to an immutable location
      profile, so retention/immutability guarantees cannot be circumvented by
      deleting the Kubernetes object.
      Immutability is NOT a field on the RestorePoint; it is a property of the
      originating Location Profile (spec.locationSpec.objectStore.protectionPeriod).
      This policy resolves it with a Kyverno context apiCall to that Profile.
      VERIFIED (cluster dump 2026-06-29, K10 8.5.12): RestorePointContent has NO
      spec (status only); RestorePoint and RestorePointContent both carry the
      `k10.kasten.io/policyName` / `policyNamespace` labels when policy-managed
      (used here as the managed marker); the real Location Profile uses
      `spec.locationSpec.objectStore` (objectStoreType S3) - so protectionPeriod
      lives at spec.locationSpec.objectStore.protectionPeriod.
      LIMITATION (K10 8.5.12): the originating Profile reference is NOT exposed on
      the RestorePoint/RestorePointContent object - their status carried only
      {actionTime, restorePointRef, scheduledTime, state} with no
      `originatingPolicies` and no `artifacts[].meta.*.profileRef`. The profile is
      only referenced on the originating Action (spec.profile), not on the
      restore-point object. So on this version the apiCall below cannot resolve a
      profile from the object alone (profileName stays "") and the policy will NOT
      deny - it degrades safely to allow. The artifacts/originatingPolicies paths
      are retained as forward-compatible best-effort for versions that populate
      them. To enforce on 8.5.12, resolve the profile via the originating Policy
      (label -> Policy.spec.actions[].exportParameters.profile -> Profile), which
      requires confirming the Policy export schema first.
spec:
  validationFailureAction: Audit
  background: false
  rules:
    - name: deny-immutable-delete
      match:
        any:
          - resources:
              kinds:
                - apps.kio.kasten.io/v1alpha1/RestorePoint
                - apps.kio.kasten.io/v1alpha1/RestorePointContent
              operations:
                - DELETE
      context:
        # Policy-managed marker = the k10.kasten.io/policyName label, confirmed
        # present on real RestorePoint/RestorePointContent objects (K10 8.5.12).
        # On DELETE the object is in oldObject; fall back to object for testing.
        - name: policyName
          variable:
            jmesPath: >-
              (request.oldObject.metadata.labels."k10.kasten.io/policyName" ||
               request.object.metadata.labels."k10.kasten.io/policyName")
            default: ""
        # [best-effort, empty on 8.5.12] originating Profile ref, taken from the
        # first artifact that carries one. Confirmed ABSENT in 8.5.12 status;
        # retained for forward-compatibility with versions that populate it.
        - name: profileNamespace
          variable:
            jmesPath: >-
              (request.oldObject.status.restorePointContentDetails.artifacts[].meta.*.profileRef.namespace | [0]) ||
              (request.object.status.restorePointContentDetails.artifacts[].meta.*.profileRef.namespace | [0]) ||
              (request.oldObject.status.restorePointDetails.artifacts[].meta.*.profileRef.namespace | [0]) ||
              (request.object.status.restorePointDetails.artifacts[].meta.*.profileRef.namespace | [0])
            default: "kasten-io"
        - name: profileName
          variable:
            jmesPath: >-
              (request.oldObject.status.restorePointContentDetails.artifacts[].meta.*.profileRef.name | [0]) ||
              (request.object.status.restorePointContentDetails.artifacts[].meta.*.profileRef.name | [0]) ||
              (request.oldObject.status.restorePointDetails.artifacts[].meta.*.profileRef.name | [0]) ||
              (request.object.status.restorePointDetails.artifacts[].meta.*.profileRef.name | [0])
            default: ""
        # Resolve immutability from the originating Location Profile. The live
        # Profile uses spec.locationSpec.objectStore; spec.export.location.* is
        # kept as a defensive secondary in case a profile variant uses it. In
        # offline CLI tests this value is injected via the variables file, which
        # overrides the apiCall (no live cluster needed).
        - name: protectionPeriod
          apiCall:
            urlPath: "/apis/config.kio.kasten.io/v1alpha1/namespaces/{{ profileNamespace }}/profiles/{{ profileName }}"
            jmesPath: >-
              spec.locationSpec.objectStore.protectionPeriod ||
              spec.export.location.objectStore.protectionPeriod || ''
            default: ""
      # Only policy-managed restore points are in scope.
      preconditions:
        all:
          - key: "{{ policyName }}"
            operator: NotEquals
            value: ""
      validate:
        message: >-
          Deletion denied: this RestorePoint/RestorePointContent is policy-managed
          and was exported to an immutable location profile (protectionPeriod is
          set). Immutable restore points must expire naturally and cannot be
          deleted manually.
        deny:
          conditions:
            all:
              - key: "{{ protectionPeriod }}"
                operator: NotEquals
                value: ""
