apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-expiry-on-manual-actions
  annotations:
    policies.kyverno.io/title: Require Expiry on Manual Actions
    policies.kyverno.io/category: Veeam Kasten
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: BackupAction, RunAction
    kyverno.io/kyverno-version: 1.12.1
    policies.kyverno.io/minversion: 1.12.0
    kyverno.io/kubernetes-version: "1.24-1.30"
    # SCOPE B: requires Kasten v9.0 admission control on Actions (Preview).
    veeamkasten.dev/scope: "B"
    veeamkasten.dev/availability: preview-v9
    veeamkasten.dev/status: verified
    policies.kyverno.io/description: >-
      Require manually created Veeam Kasten BackupAction and RunAction objects to
      set spec.expiresAt (RFC3339), so ad-hoc restore points are garbage
      collected and do not accumulate indefinitely. Policy-managed actions are
      exempt: they are identified by the presence of the
      `k10.kasten.io/policyName` label and have their lifecycle governed by the
      owning Policy.
      REQUIRES Kasten v9.0 admission control on Actions (Preview); without it the
      API server does not route Actions through the admission webhook (the lab is
      K10 8.5.12, so this path is not yet installable there).
      STATUS: verified (cluster dump 2026-06-29, K10 8.5.12). spec.expiresAt
      confirmed on both BackupAction and RunAction via `oc explain --recursive`.
      The manual-vs-managed discriminator is confirmed at the object level: a
      manually triggered RestoreAction (`restore-etcd-vgtcc`) carried only
      `k10.kasten.io/appName` / `appNamespace`, with NO `k10.kasten.io/policyName`,
      while every policy-created action carried
      `k10.kasten.io/policyName` + `policyNamespace` + `runActionName`. (No manual
      BackupAction/RunAction existed in the lab to observe directly; the label
      convention is identical across action kinds.)
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: manual-action-must-expire
      match:
        any:
          - resources:
              kinds:
                - actions.kio.kasten.io/v1alpha1/BackupAction
                - actions.kio.kasten.io/v1alpha1/RunAction
              operations:
                - CREATE
                - UPDATE
      context:
        # Resolve the policy-managed marker safely; absent labels -> "".
        - name: policyName
          variable:
            jmesPath: 'request.object.metadata.labels."k10.kasten.io/policyName"'
            default: ""
      # Only manual (non-policy-managed) actions are in scope.
      preconditions:
        all:
          - key: "{{ policyName }}"
            operator: Equals
            value: ""
      validate:
        message: >-
          Manually created BackupAction/RunAction objects must set
          spec.expiresAt (RFC3339) so their restore points expire. Policy-managed
          actions (carrying the k10.kasten.io/policyName label) are exempt.
        pattern:
          spec:
            expiresAt: "?*"
